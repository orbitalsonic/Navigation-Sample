<!--?xml version="1.0" encoding="UTF-8"?-->
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="1400" viewBox="0 0 800 1400">

    <defs>
        <style>
            .line{
                fill:none;
                stroke:#D4AF37;
                stroke-width:3;
                stroke-linecap:square;
                stroke-linejoin:miter;
            }
        </style>
    </defs>

    <!-- Outer Border -->
    <rect x="20" y="20" width="760" height="1360" class="line"></rect>

    <!-- Inner Border -->
    <rect x="50" y="50" width="700" height="1300" class="line"></rect>

    <!-- ========= TOP LEFT ========= -->
    <g class="line">
        <path d="M60 60 H120"></path>
        <path d="M60 60 V120"></path>

        <path d="M75 60 V105 H105"></path>
        <path d="M90 60 V90 H120"></path>

        <path d="M60 75 H105"></path>
        <path d="M60 90 H90"></path>
    </g>

    <!-- ========= TOP RIGHT ========= -->
    <g class="line" transform="translate(800,0) scale(-1,1)">
        <path d="M60 60 H120"></path>
        <path d="M60 60 V120"></path>

        <path d="M75 60 V105 H105"></path>
        <path d="M90 60 V90 H120"></path>

        <path d="M60 75 H105"></path>
        <path d="M60 90 H90"></path>
    </g>

    <!-- ========= BOTTOM LEFT ========= -->
    <g class="line" transform="translate(0,1400) scale(1,-1)">
        <path d="M60 60 H120"></path>
        <path d="M60 60 V120"></path>

        <path d="M75 60 V105 H105"></path>
        <path d="M90 60 V90 H120"></path>

        <path d="M60 75 H105"></path>
        <path d="M60 90 H90"></path>
    </g>

    <!-- ========= BOTTOM RIGHT ========= -->
    <g class="line" transform="translate(800,1400) scale(-1,-1)">
        <path d="M60 60 H120"></path>
        <path d="M60 60 V120"></path>

        <path d="M75 60 V105 H105"></path>
        <path d="M90 60 V90 H120"></path>

        <path d="M60 75 H105"></path>
        <path d="M60 90 H90"></path>
    </g>

</svg>